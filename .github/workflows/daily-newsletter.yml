name: Daily Newsletter

on:
  schedule:
    - cron: '0 10 * * *'  # 6am Eastern / 10am UTC every day
  workflow_dispatch:        # lets you trigger it manually from GitHub too

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_newsletter.py

      - name: Commit and push
        run: |
          git config user.name "Daily Edition Bot"
          git config user.email "bot@thedailyedition.news"
          git add docs/newsletter.json docs/archive/ docs/index.html
          git diff --staged --quiet || git commit -m "Daily newsletter — $(date -u +'%B %d, %Y')"
          git push
